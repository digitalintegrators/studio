<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Labs logo</title>
  <desc id="desc">Modern italic Labs wordmark with white to silver gradient on a dark background.</desc>
  <defs>
    <linearGradient id="textGradient" x1="320" y1="170" x2="1280" y2="545" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#F8F8F8"/>
      <stop offset="0.72" stop-color="#D9DEE3"/>
      <stop offset="1" stop-color="#8C949C"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 350) rotate(90) scale(420 820)">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#05070C"/>
      <stop offset="1" stop-color="#020409"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="700" fill="url(#bgGlow)"/>

  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, Arial Rounded MT Bold, Arial, Helvetica, sans-serif"
    font-size="430"
    font-weight="900"
    font-style="italic"
    letter-spacing="-34"
    fill="url(#textGradient)"
    filter="url(#softShadow)">Labs</text>
</svg>
